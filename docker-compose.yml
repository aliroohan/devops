version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build:
      context: ./
      dockerfile: Dockerfile.combined
    container_name: expense-tracker-app
    restart: always
    ports:
      - "80:80"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/expense-tracker
      - JWT_SECRET=expense_tracker_jwt_secret_key_2026
      - JWT_EXPIRE=7d
      - PORT=5000
    depends_on:
      - mongodb

volumes:
  mongodb_data:
