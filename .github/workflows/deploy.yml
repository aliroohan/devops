# Required GitHub Secrets (Repository → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME            Docker Hub username
#   DOCKERHUB_TOKEN               Docker Hub access token (recommended) or password
#   AZURE_CLIENT_ID               App registration / service principal Application (client) ID
#   AZURE_CLIENT_SECRET           Service principal client secret (value, not "Secret ID")
#   AZURE_SUBSCRIPTION_ID         Azure subscription ID
#   AZURE_TENANT_ID               Microsoft Entra tenant (directory) ID
#   AKS_CLUSTER_NAME              AKS cluster name
#   AKS_RESOURCE_GROUP            Resource group containing the cluster
#
# Azure login expects a JSON object with keys exactly: clientId, clientSecret, subscriptionId, tenantId
# (camelCase). A single AZURE_CREDENTIALS blob often fails if keys are wrong or the JSON is truncated.
# This workflow builds that JSON from four secrets (see Azure/login README).
#
# The service principal needs rights to fetch AKS kubeconfig (e.g. Azure Kubernetes Service Cluster User Role).

name: CI — build, test, push, deploy AKS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cicd:
    runs-on: ubuntu-latest
    env:
      # Single image referenced by k8s for expense-tracker-app (see k8s-deployment.yaml)
      DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-app:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Build & test frontend (Vite/React) ---
      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend (compile + bundle)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # --- Build & test backend (Express) ---
      - name: Setup Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend & syntax check
        working-directory: backend
        run: |
          npm ci
          node --check src/server.js

      # --- Docker: combined app image (frontend + nginx + backend inside one container) ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.combined
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}
            ${{ secrets.DOCKERHUB_USERNAME }}/expense-tracker-app:${{ github.sha }}

      # --- Deploy to AKS (apply manifest with substituted image — repo file untouched) ---
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: kubectl apply with CI image reference
        run: |
          set -euo pipefail
          # Replace deployed image so it matches Docker Hub account in secrets (committed yaml may use another username).
          sed "s|image:.*expense-tracker-app:.*|image: ${DOCKER_IMAGE}|" k8s-deployment.yaml | kubectl apply -f -

      - name: Rollout restart (pick up new :latest digest)
        run: |
          kubectl rollout restart deployment/expense-tracker-app -n expense-tracker
          kubectl rollout status deployment/expense-tracker-app -n expense-tracker --timeout=300s
